name: lint

# CI v2 (#456): the lightweight GitHub gate is manual/on-demand only.
# Normal merge evidence is local: run `make ci-pr` plus the documented local
# parity gates in TEST.md for affected runtime/UI/release paths. This workflow
# remains available as an explicit operator-triggered verification run when a
# GitHub-hosted copy of the lightweight/static evidence is useful.
#
# Heavy/runtime coverage is preserved through the local make tiers:
#   - make local-pre-merge      (xcodebuild test-bundle compile, app-unit,
#                                scenario/smoke, HTTP E2E, real-pie contract,
#                                gmake canary)
#   - make local-gui-gate       (seated GUI/XCUITest)
#   - make local-e2e-gate       (real-engine/model/signing/live-service paths)
#   - make release-gate         (live-HF/packaging/readiness checks)
# The manual jobs below keep only static/lint/provenance, compile/type checks,
# cheap deterministic unit/contract tests, and release-script contracts.

on:
  workflow_dispatch:

jobs:
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      inferlets: ${{ steps.filter.outputs.inferlets }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            inferlets:
              - 'Inferlets/**'
              - 'Vendor/pie'
              - 'Scripts/stamp-chat-apc.sh'
              - 'Makefile'

  pr-static-gate:
    name: PR static gate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up xcodegen
        run: brew install xcodegen

      - name: Run lightweight deterministic PR gate
        run: make ci-pr

  inferlet-provenance:
    name: chat-apc inferlet provenance
    runs-on: macos-15
    needs: changes
    # Fail-open on detector failure: an errored/empty detector output must run
    # the cheap provenance checks rather than skip-as-Success. Keep != 'false'.
    if: ${{ !cancelled() && needs.changes.outputs.inferlets != 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache chat-apc cargo target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "Inferlets/chat-apc"

      - name: Stamp helper unit tests
        run: make test-stamp

      - name: Inferlet Rust unit tests (native)
        run: make test-inferlets

      - name: Verify committed prebuilt matches stamp
        run: make verify-inferlets
