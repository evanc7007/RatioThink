name: lint

# Wires `make lint` + the lint-self-test + the unit/scenario test
# bundles into CI per  review findings F8 (lint in CI) and
# F4 (the ResolveProbe CI hard-fail path was dead until CI actually
# ran the tests).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-helper-side-effects:
    name: lint Helper side-effect APIs
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Run lint
        run: make lint

      - name: Self-test the lint script
        run: ./Scripts/test-lint-helper-side-effects.sh

  build-tests:
    name: build every xcodebuild target
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up xcodegen
        run: brew install xcodegen

      - name: Generate RatioThink.xcodeproj
        run: make genproject

      - name: Verify app icon assets
        run: make verify-app-icon-assets

      - name: Regression-test app icon verifier
        run: make test-app-icon-assets

      - name: Regression-test DMG drag-install layout verifier
        run: make test-dmg-layout

      - name: Build app + helper
        run: make build

      - name: Compile every test target (review v4 F1)
        run: make build-tests

      - name: Run Xcode ChatScaffold regression guard (review v1 F1)
        run: make test-xcode-chat-scaffold

  unit-and-scenario-tests:
    # Runs the SPM test bundles. Exercises the production env-fallback
    # code paths via the `pie-resolve-probe` binary (review v6 F4) so
    # `ResolveProbe.find()`'s CI hard-fail branch is not dead code.
    name: swift test (unit + scenario)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build SPM probe (review v5 F2)
        run: xcrun swift build --product pie-resolve-probe

      - name: Unit tests
        run: make test-unit

      - name: Scenario tests
        run: make test-scenario

      - name: Collect-diagnostics script self-test (#358)
        run: make test-collect-diagnostics

  sanitizer-stability-canary:
    #  F8. Catches drift between SpawnEnvSanitizer's
    # declared prefix/exact-key policy and its actual filter behavior
    # by injecting one canary key per documented family and asserting
    # the live process env round-trips through `sanitize(...)` per
    # the contract. Unit tests cover synthetic input; this job covers
    # the `swift test → xctest → bundle` env-propagation path.
    name: SpawnEnvSanitizer canary
    runs-on: macos-15
    env:
      SPAWN_SANITIZER_CANARY: "1"
      # Prefix-family canaries — one per family in stripPrefixes
      # that survives `swift test → xctest` env propagation AND
      # does not poison the Swift toolchain mid-run.
      # DYLD_* and __XPC_XCTEST_* are stripped on exec by hardened-
      # runtime xctest, so they cannot be e2e-injected.
      # MallocStackLogging activates malloc stack logging in every
      # child swift-frontend/clang/ld spawned during compile and
      # trips swift-driver out with "error: fatalError" before any
      # test runs; there is no inert value.
      # All three are covered by SpawnEnvSanitizerTests against
      # synthetic input.
      PIE_SANITIZER_CANARY: canary
      RUST_SANITIZER_CANARY: canary
      MTL_SANITIZER_CANARY: canary
      XCTestSanitizerCanary: canary
      XCTEST_SANITIZER_CANARY: canary
      __XCODE_SANITIZER_CANARY: canary
      OS_ACTIVITY_SANITIZER_CANARY: canary
      OBJC_SANITIZER_CANARY: canary
      # Exact-key canary. SDKROOT / DEVELOPER_DIR / TOOLCHAINS
      # would break xcrun / Swift toolchain resolution if overridden
      # to canary values; NSZombieEnabled is inert at runtime.
      NSZombieEnabled: canary
      # Survival canaries.
      #   · `PIESURVIVES_CANARY` is NOT `PIE_*` (no underscore) — proves
      #     the prefix policy requires the trailing underscore.
      #   · `MallocCanarySurvives` does not start with
      #     `MallocStackLogging` — proves the prefix policy does not
      #     over-match unrelated `Malloc` siblings.
      PIESURVIVES_CANARY: canary
      MallocCanarySurvives: canary
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Run sanitizer canary
        # Review v1 F2: `--filter` matching zero tests would exit 0 and
        # silently green the job (renamed class, file moved out of test
        # target, build product not re-emitted). Capture output and
        # assert an `Executed N tests` line with N >= 3 (matches the
        # current count of test_* functions in
        # SpawnEnvSanitizerCanaryTests). Bump the lower bound whenever
        # the suite grows.
        run: |
          set +e
          xcrun swift test --filter SpawnEnvSanitizerCanaryTests 2>&1 | tee canary.out
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "FAIL: canary recipe exited $rc"
            exit "$rc"
          fi
          if ! grep -Eq 'Executed [3-9][0-9]* tests, with 0 failures' canary.out; then
            echo "FAIL: expected 'Executed N tests, with 0 failures' line with N>=3 — filter may have matched zero tests (renamed class? bundle stale?)"
            exit 1
          fi
          echo "sanitizer-canary: $(grep -E 'Executed [0-9]+ tests' canary.out | tail -1)"

  build-inferlets:
    #  — item 4. Wires `make build-inferlets` (cargo build
    # --release --target wasm32-wasip2 -> prebuilt/) and the stamp
    # checksum verify into CI so a `src/` edit, a Vendor/pie bump, or
    # a wasm byte-drift surfaces as a red build instead of an opaque
    # harness failure in .
    #
    # `verify-inferlets` runs against the committed prebuilt+stamp
    # (does not depend on a fresh cargo build) so the verify result
    # is independent of cross-machine wasm reproducibility. The
    # cargo step that follows proves the inferlet still builds on a
    # clean checkout with the pinned toolchain target.
    name: chat-apc inferlet build + stamp verify
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Stamp helper unit tests
        run: make test-stamp

      - name: Verify committed prebuilt matches stamp (full)
        run: make verify-inferlets

      - name: Build inferlet wasm
        run: make build-inferlets

      - name: Verify rebuilt-tree inputs still match stamp (review v1 F3)
        # Re-asserts vendor_pie_sha + src_sha256 against the freshly
        # rebuilt tree, tolerating only wasm_sha256 / wasm_size drift.
        # Catches Cargo.lock divergence and stale-cache resolution
        # that the pre-build verify cannot see. wasm-byte
        # reproducibility across machines / rust-stable patch
        # versions is intentionally NOT enforced.
        run: make verify-inferlets-inputs

  gmake-sanity-fail-injection:
    #  v8 F2 / . macOS ships /usr/bin/make 3.81 which
    # silently ignores `.SHELLFLAGS` (so `set -e -o pipefail` never
    # activates) — the Makefile's `set +e +o pipefail` per-recipe
    # guard was theoretically necessary for gmake 4.x compatibility
    # but had no locally available 4.x to verify against. This job
    # installs Homebrew gmake 4.x, runs `make test-unit` with a
    # transient XCTFail injection, and asserts:
    #   1. recipe exits nonzero (pipeline status propagated, not
    #      swallowed by gmake's `set -e`), AND
    #   2. `log: <path>` line printed BEFORE the recipe aborts (the
    #      guard neutralized gmake 4.x's `set -e -o pipefail`).
    name: Makefile recipe under gmake 4.x
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Homebrew gmake
        run: brew install make

      - name: Resolve gmake binary
        id: gmake
        run: |
          set -eu
          gmake_bin="$(brew --prefix)/opt/make/libexec/gnubin/make"
          if [ ! -x "$gmake_bin" ]; then
            gmake_bin="$(command -v gmake)"
          fi
          "$gmake_bin" --version | head -1
          echo "bin=$gmake_bin" >> "$GITHUB_OUTPUT"

      - name: Run sanity-fail injection under gmake
        env:
          PIE_SANITY_FAIL_INJECTION: "1"
        run: |
          # Deliberately allow nonzero — the recipe MUST fail for the
          # invariants to be meaningful. Capture stdout+stderr.
          set +e
          "${{ steps.gmake.outputs.bin }}" test-unit > sanity.out 2>&1
          rc=$?
          set -e
          echo "--- recipe output (last 60 lines) ---"
          tail -60 sanity.out
          echo "--- recipe exit code: $rc ---"
          if [ "$rc" -eq 0 ]; then
            echo "FAIL: expected nonzero recipe exit (sanity-fail injection should propagate); got 0"
            exit 1
          fi
          if ! grep -Eq '^log: ' sanity.out; then
            echo "FAIL: expected '^log: <path>$' line in recipe output but did not find one — gmake 4.x set -e -o pipefail may have aborted before the log-path echo (Makefile guard regression)"
            exit 1
          fi
          # Review v1 F1: rc != 0 + `log:` line are both satisfied
          # by ANY recipe-side red (compile error, missing toolchain,
          # unrelated XCTFail, SwiftPM resolve flake) — neither
          # proves the injected XCTFail actually fired. Bind the
          # green-light to the sentinel string XCTFail prints
          # (Tests/RatioThinkCoreTests/SanityFailInjectionTests.swift
          # `Self.sentinel`). If the sentinel ever changes there,
          # mirror it here.
          #
          # The Makefile recipe pipes test output through `tee $LOG |
          # tail -20`, so the XCTFail line (which contains the
          # sentinel) lands in the log file but typically not in the
          # last 20 lines of stdout — read both. Extract the log
          # path from the recipe's `^log: <path>$` echo, fall back
          # to stdout-only grep if the path is unreadable.
          log_path="$(grep -Eo '^log: .+' sanity.out | head -1 | sed -E 's/^log: //' || true)"
          search_sources="sanity.out"
          if [ -n "$log_path" ] && [ -r "$log_path" ]; then
            search_sources="sanity.out $log_path"
          else
            echo "warning: could not read recipe log file path='$log_path' — sentinel grep will only see stdout"
          fi
          if ! grep -Fq 'PIE_SANITY_FAIL_INJECTION_FIRED_v1' $search_sources; then
            echo "FAIL: sentinel 'PIE_SANITY_FAIL_INJECTION_FIRED_v1' not found in recipe stdout OR log file ($log_path) — recipe failed for an UNRELATED reason (compile error, toolchain, flake) and the canary would have false-greened on the gmake-guard claim."
            echo "--- log file tail ---"
            [ -n "$log_path" ] && [ -r "$log_path" ] && tail -40 "$log_path" || echo "(log file unreadable: $log_path)"
            exit 1
          fi
          # Also assert at least one suite actually ran (catches the
          # silent no-tests-discovered path where the bundle compiled
          # but the filter matched nothing).
          if ! grep -Eq 'Executed [0-9]+ tests' $search_sources; then
            echo "FAIL: no 'Executed N tests' line in stdout or log — recipe failed before any tests ran"
            exit 1
          fi
          echo "gmake-canary: rc=$rc, log line + injection sentinel + Executed line present (sources: $search_sources), recipe guard works under gmake 4.x"

  release-scripts:
    # Real-tool contract tests for the notarization + preflight scripts
    # (Scripts/test-{notarize,release-preflight}.sh). They drive codesign /
    # spctl / hdiutil against throwaway ad-hoc bundles — no xcodegen, no
    # rust, no Apple round-trip — so they are fast and deterministic, and
    # they keep the loud-fail / Gatekeeper-rejection contracts (#357) from
    # silently regressing.
    name: release script contract tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Notarize + preflight contract tests
        run: make test-release
