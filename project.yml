name: RatioThink
options:
  bundleIdPrefix: com.ratiothink.app
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES
    GENERATE_INFOPLIST_FILE: YES
    # GENERATE_INFOPLIST_FILE=YES synthesizes CFBundleShortVersionString /
    # CFBundleVersion from these build settings; without them the version
    # keys in each target's info.properties are dropped from the built bundle.
    MARKETING_VERSION: "0.1.1"
    CURRENT_PROJECT_VERSION: "2"
    ENABLE_HARDENED_RUNTIME: NO
    DEAD_CODE_STRIPPING: YES
  configs:
    # Notarization requires the hardened runtime on every executable in the
    # bundle. Enable it for Release only so Debug builds (make build /
    # install-app / GUI tests) keep their unhardened + get-task-allow
    # debugging behavior. The pie engine is already signed `--options
    # runtime` in Scripts/build-pie-engine.sh regardless of configuration;
    # this hardens the app + helper that Xcode signs directly. The helper
    # already carries cs.allow-jit / cs.allow-unsigned-executable-memory and
    # the app needs no JIT, so no entitlement changes are required.
    Release:
      ENABLE_HARDENED_RUNTIME: YES
      # Do not inject the base debug entitlements (get-task-allow) into the
      # Release build. The notary service REJECTS any executable carrying
      # com.apple.security.get-task-allow. A Developer ID signature normally
      # omits it, but ad-hoc/local signing injects it by default — disabling
      # injection guarantees the notarization candidate is clean regardless of
      # the signing identity. Debug keeps injection on so lldb can attach.
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
      # Force a secure timestamp on the Release codesign. `xcodebuild build`
      # signs with `--timestamp=none` by default (only `archive`/export reach a
      # secure TSA), but the notary service REJECTS any executable without one
      # ("The signature does not include a secure timestamp"). Setting it on the
      # Release config means both the app and the embedded helper that Xcode
      # signs get a secure timestamp; the pie engine already signs --timestamp
      # in build-pie-engine.sh. The RatioThink target adds --preserve-metadata
      # via $(inherited), so both flags survive on the app target.
      OTHER_CODE_SIGN_FLAGS: $(inherited) --timestamp

packages:
  TOMLKit:
    url: https://github.com/LebJe/TOMLKit
    from: "0.6.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:
  RatioThink:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Shared
      - path: Resources/Assets.xcassets
        optional: true
    # Bundle the chat-apc inferlet (wasm + manifest) into
    # App.app/Contents/Resources/Inferlets/chat-apc/. Source-tree
    # layout (`Inferlets/chat-apc/prebuilt/chat-apc.wasm` +
    # `Inferlets/chat-apc/Pie.toml`) does not map 1:1 to the
    # bundle subpath the launcher expects, and xcodegen's `resources:`
    # entries land flat in `Contents/Resources/` (no per-file
    # destination control), so use a build-phase script with explicit
    # input/output declarations. Inputs/outputs let the build system
    # skip the copy when neither file changed ( item 1).
    postCompileScripts:
      - name: Bundle chat-apc inferlet
        script: |
          set -euo pipefail
          DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Inferlets/chat-apc"
          mkdir -p "$DEST"
          cp "${SRCROOT}/Inferlets/chat-apc/prebuilt/chat-apc.wasm" "$DEST/"
          cp "${SRCROOT}/Inferlets/chat-apc/Pie.toml" "$DEST/"
        inputFiles:
          - $(SRCROOT)/Inferlets/chat-apc/prebuilt/chat-apc.wasm
          - $(SRCROOT)/Inferlets/chat-apc/Pie.toml
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Inferlets/chat-apc/chat-apc.wasm
          - $(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Inferlets/chat-apc/Pie.toml
    # Stage the Helper launchd plist into Contents/Library/LaunchAgents/
    # so SMAppService.agent(plistName:) can register it. Must be a
    # postCompileScript (pre-CodeSign) like the inferlet/engine staging:
    # the plist has to be sealed into the bundle's CodeResources, else
    # the outer codesign rejects "resource added that did not exist at
    # signing" and SMAppService refuses an unsealed agent plist.
      - name: Stage Helper LaunchAgent plist
        script: |
          set -euo pipefail
          DEST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Library/LaunchAgents"
          mkdir -p "$DEST"
          cp "${SRCROOT}/Helper/com.ratiothink.app.helper.plist" "$DEST/"
        inputFiles:
          - $(SRCROOT)/Helper/com.ratiothink.app.helper.plist
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchAgents/com.ratiothink.app.helper.plist
    # Bundle Scripts/collect-diagnostics.sh into Contents/Resources/ so a
    # downloaded build carries it (#358). Pre-CodeSign (postCompileScript) so
    # it is sealed into CodeResources — else the outer codesign rejects a
    # "resource added that did not exist at signing". The App's Help → Collect
    # Diagnostics… menu runs this exact copy, and a user can run it standalone
    # when the app won't launch:
    #   /Applications/RatioThink.app/Contents/Resources/collect-diagnostics.sh
      - name: Bundle collect-diagnostics script
        script: |
          set -euo pipefail
          DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "$DEST"
          cp "${SRCROOT}/Scripts/collect-diagnostics.sh" "$DEST/"
          chmod +x "$DEST/collect-diagnostics.sh"
        inputFiles:
          - $(SRCROOT)/Scripts/collect-diagnostics.sh
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/collect-diagnostics.sh
    # Build the pie engine binary (Vendor/pie `pie-server` crate, bin
    # `pie`) for the current Xcode arch, stage into
    # Contents/Resources/pie-engine/pie (the path
    # Shared/Engine/PieSupervisor.swift expects), and codesign with the
    # engine's own entitlements.  phase 5.10.
    #
    # Must live in postCompileScripts (NOT postBuildScripts): xcodegen
    # appends postBuild phases after Xcode's implicit CodeSign step,
    # which would invalidate the bundle's _CodeSignature/CodeResources
    # seal as soon as we add or replace Contents/Resources/pie-engine/
    # pie afterwards — notarization rejects "resource added that did
    # not exist at signing" (review v2 F1). Running pre-CodeSign means
    # the engine is sealed into CodeResources as part of the bundle.
    #
    # To stop Xcode's outer codesign from stripping the engine's own
    # entitlements (the original review v1 F3 concern), we set
    # OTHER_CODE_SIGN_FLAGS on the RatioThink target to include
    # `--preserve-metadata=identifier,entitlements,flags`. That tells
    # codesign to preserve the engine's standalone entitlements when
    # it re-signs nested binaries during the bundle seal.
    #
    # No `basedOnDependencyAnalysis` block: cargo owns Vendor/pie/'s
    # dep graph and a fresh cargo no-op is sub-second; declaring an
    # outputFiles path here lets Xcode skip the phase by mtime even
    # when sources changed, masking stale-engine bugs (review v1 F2).
      - name: Build pie engine binary
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          "${SRCROOT}/Scripts/build-pie-engine.sh"
    dependencies:
      - target: RatioThinkHelper
        embed: true
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Library/LoginItems
      - package: TOMLKit
      - package: MarkdownUI
        product: MarkdownUI
    info:
      path: App/Info.plist
      properties:
        LSMinimumSystemVersion: "14.0"
        CFBundleIdentifier: com.ratiothink.app
        CFBundleIconFile: AppIcon
        CFBundleName: RatioThink
        CFBundleDisplayName: RatioThink
        CFBundleShortVersionString: "0.1.1"
        CFBundleVersion: "2"
        NSHumanReadableCopyright: "© 2026 RatioThink"
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        # `ratiothink://` deep-link scheme. The menu-bar Helper opens
        # `ratiothink://settings` so the app routes straight to Settings
        # (App/SettingsURLHandler.swift) instead of merely foregrounding the
        # window. Scheme string is owned by Shared/SettingsDeepLink.swift.
        CFBundleURLTypes:
          - CFBundleURLName: com.ratiothink.app.deeplink
            CFBundleURLSchemes:
              - ratiothink
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ratiothink.app
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/RatioThink.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Preserve the pie engine's standalone entitlements during the
        # outer bundle CodeSign. The engine binary is signed in the
        # `Build pie engine binary` postCompileScript with allow-jit /
        # network.server / etc.; without these flags Xcode's bundle
        # codesign re-signs nested executables using the host app's
        # entitlements, dropping the engine's JIT/network grants and
        # crashing it under hardened runtime. (Review v1 F3 / v2 F1.)
        OTHER_CODE_SIGN_FLAGS: $(inherited) --preserve-metadata=identifier,entitlements,flags

  RatioThinkHelper:
    type: application
    platform: macOS
    sources:
      - path: Helper
        # Staged into RatioThink.app/Contents/Library/LaunchAgents/ by the RatioThink
        # target's postCompileScript; not a RatioThinkHelper resource.
        excludes:
          - com.ratiothink.app.helper.plist
      - path: Shared
    dependencies:
      - package: TOMLKit
    info:
      path: Helper/Info.plist
      properties:
        LSUIElement: YES
        CFBundleIdentifier: com.ratiothink.app.helper
        CFBundleName: RatioThinkHelper
        CFBundleDisplayName: RatioThinkHelper
        CFBundleShortVersionString: "0.1.1"
        CFBundleVersion: "2"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ratiothink.app.helper
        INFOPLIST_FILE: Helper/Info.plist
        CODE_SIGN_ENTITLEMENTS: Helper/RatioThinkHelper.entitlements

  RatioThinkTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/Unit
    dependencies:
      - target: RatioThink
      - package: TOMLKit
      - package: MarkdownUI
        product: MarkdownUI

  RatioThinkGUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/GUIScenarioTests
    dependencies:
      - target: RatioThink
      - target: RatioThinkHelper
    settings:
      base:
        TEST_TARGET_NAME: RatioThink

  # #440: Helper-executable unit tests. The App-hosted RatioThinkTests cannot
  # cover HelperAppDelegate — a unit bundle can't ALSO link RatioThinkHelper
  # without duplicating every Shared symbol — so the Helper gets its own
  # host-app unit-test bundle, mirroring how RatioThinkTests hosts RatioThink.
  # The RatioThinkHelper host's applicationDidFinishLaunching early-returns when
  # PIE_TEST_HELPER_NO_BOOT=1 (set on the scheme below), so the test host runs
  # none of the real boot (status item / login-item registration / XPC bind)
  # and mutates no machine state.
  RatioThinkHelperTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/HelperUnit
    dependencies:
      - target: RatioThinkHelper
      - package: TOMLKit

schemes:
  # Explicit scheme so the test action sets PIE_TEST_HELPER_NO_BOOT=1 in the
  # RatioThinkHelper host process from launch (XCTest's own configuration env is
  # injected too late for the helper's applicationDidFinishLaunching). Without
  # it the host's real boot binds the com.ratiothink.helper mach service and
  # hard-traps in verifyStartupInvariants under the ad-hoc-signed test host.
  RatioThinkHelperTests:
    build:
      targets:
        RatioThinkHelperTests: [test]
    test:
      environmentVariables:
        PIE_TEST_HELPER_NO_BOOT: "1"
      targets:
        - RatioThinkHelperTests
